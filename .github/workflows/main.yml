name: Keep Supabase Alive

on:
  workflow_dispatch: 
  schedule:
    # Daily at midnight UTC to ensure Supabase stays active
    - cron: "0 0 */3 * *"

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Call API
        run: |
          curl -i "https://notes-organizer-aba.vercel.app/api/health?t=$(date +%s)"
